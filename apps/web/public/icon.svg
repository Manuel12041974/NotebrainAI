<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338ca" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Subtle inner glow -->
  <rect x="24" y="24" width="464" height="464" rx="88" ry="88" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Brain/notebook icon -->
  <g transform="translate(256,240)" fill="url(#brain)">
    <!-- Left hemisphere -->
    <path d="M-80,-100 C-120,-100 -140,-70 -140,-40 C-140,-10 -120,10 -100,20 C-120,30 -130,50 -120,70 C-110,90 -80,100 -60,95 C-50,110 -20,120 0,110" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Right hemisphere -->
    <path d="M80,-100 C120,-100 140,-70 140,-40 C140,-10 120,10 100,20 C120,30 130,50 120,70 C110,90 80,100 60,95 C50,110 20,120 0,110" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Center line -->
    <line x1="0" y1="-100" x2="0" y2="110" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
    <!-- Neural connections left -->
    <circle cx="-70" cy="-50" r="6" fill="white" opacity="0.9"/>
    <circle cx="-90" cy="10" r="5" fill="white" opacity="0.8"/>
    <circle cx="-60" cy="60" r="6" fill="white" opacity="0.9"/>
    <!-- Neural connections right -->
    <circle cx="70" cy="-50" r="6" fill="white" opacity="0.9"/>
    <circle cx="90" cy="10" r="5" fill="white" opacity="0.8"/>
    <circle cx="60" cy="60" r="6" fill="white" opacity="0.9"/>
    <!-- Cross connections -->
    <line x1="-70" y1="-50" x2="70" y2="-50" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,4"/>
    <line x1="-90" y1="10" x2="90" y2="10" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,4"/>
    <line x1="-60" y1="60" x2="60" y2="60" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  </g>
  <!-- Notebook lines at bottom -->
  <g transform="translate(256,380)">
    <line x1="-80" y1="0" x2="80" y2="0" stroke="white" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="-60" y1="14" x2="60" y2="14" stroke="white" stroke-width="3" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="-40" y1="28" x2="40" y2="28" stroke="white" stroke-width="3" stroke-opacity="0.2" stroke-linecap="round"/>
  </g>
  <!-- AI sparkle -->
  <g transform="translate(370,120)">
    <path d="M0,-20 L5,-5 L20,0 L5,5 L0,20 L-5,5 L-20,0 L-5,-5 Z" fill="white" opacity="0.8"/>
  </g>
</svg>
